name: Update Store Locations

on:
  schedule:
    - cron: '0 6 1 * *'  # Runs at 6am UTC on the 1st of every month
  workflow_dispatch:       # Allows you to run it manually anytime from GitHub

jobs:
  update-stores:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run HubSpot geocode script
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: python3 hubspot_geocode.py

      - name: Commit and push updated stores.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add stores.json
          git diff --staged --quiet || git commit -m "Auto-update store locations - $(date +'%B %Y')"
          git push
